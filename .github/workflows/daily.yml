name: Daily Generate

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/candidates.json'
      - '.github/workflows/daily.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SCHOLAR_DAILY_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo state
        run: ls -la

      - name: Check candidates freshness
        # 沙箱 cron (7:50) 才是唯一渲染 + 推送者
        # 本 workflow 不再生成 index.html，避免覆盖
        run: |
          if [ ! -f data/candidates.json ]; then
            echo "::warning::data/candidates.json 不存在，沙箱 cron 会在 7:50 生成"
            exit 0
          fi
          echo "candidates.json 存在,首页由沙箱 cron 渲染后推送"
          echo "本 Actions 只负责 Pages 部署,不重新渲染"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scholar-daily-${{ github.run_id }}
          path: |
            index.html
            archive/
            downloads/
          retention-days: 7
