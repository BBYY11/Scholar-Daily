name: Daily Generate

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/candidates.json'
      - '.github/workflows/daily.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SCHOLAR_DAILY_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo state
        run: ls -la

      - name: Check candidates
        run: python3 scripts/check_candidates.py

      - name: Generate cards
        run: |
          if [ ! -f data/candidates.json ]; then
            echo "::warning::data/candidates.json 不存在，今天跳过渲染"
            exit 0
          fi
          python3 scripts/generate_today.py

      - name: Show generated stats
        run: |
          echo "=== index.html ==="
          wc -c index.html
          echo "=== archive ==="
          ls -la archive/
          echo "=== downloads ==="
          ls -la downloads/

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scholar-daily-${{ github.run_id }}
          path: |
            index.html
            archive/
            downloads/
          retention-days: 7

      - name: Commit and push
        env:
          SCHOLAR_DAILY_PAT: ${{ secrets.SCHOLAR_DAILY_PAT }}
        run: |
          git config user.name "daily-book-bot"
          git config user.email "bot@daily-book.local"
          git remote set-url origin "https://x-access-token:${SCHOLAR_DAILY_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if git diff --cached --quiet; then
            echo "无变更（生成器幂等）"
            exit 0
          fi
          git commit -m "chore: auto-generate $(date -u +%Y-%m-%d)"
          # 拉取并 rebase 以解决 fetch first 问题
          git pull --rebase --autostash origin main || git rebase --abort
          git push
