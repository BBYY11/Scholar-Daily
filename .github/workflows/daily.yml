name: Daily Generate

on:
  schedule:
    # 每天 UTC 0:30 = 北京时间 8:30
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/candidates.json'
      - '.github/workflows/daily.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repo state
        run: ls -la

      - name: Check candidates
        run: python3 scripts/check_candidates.py

      - name: Generate cards
        run: |
          if [ ! -f data/candidates.json ]; then
            echo "::warning::data/candidates.json 不存在，今天跳过渲染"
            exit 0
          fi
          python3 scripts/generate_today.py

      - name: Show generated stats
        run: |
          echo "=== index.html ==="
          wc -c index.html
          echo
          echo "=== archive ==="
          ls -la archive/
          echo
          echo "=== downloads ==="
          ls -la downloads/

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scholar-daily-${{ github.run_id }}
          path: |
            index.html
            archive/
            downloads/
          retention-days: 7

      - name: Commit and push
        run: |
          echo "=== Pre-commit debug ==="
          git status --short
          echo "=== Diff stats ==="
          git diff --cached --stat | head -20
          echo
          git config user.name "daily-book-bot"
          git config user.email "bot@daily-book.local"
          git add -A
          if git diff --cached --quiet; then
            echo "无变更（生成器幂等）"
            exit 0
          fi
          echo "=== Committing ==="
          git commit -m "chore: auto-generate $(date -u +%Y-%m-%d)"
          echo "=== Pushing ==="
          git push 2>&1
          echo "=== Push done with exit $? ==="
